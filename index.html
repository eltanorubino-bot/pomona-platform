const FreepikAPI = {
  baseUrl: "https://blue-violet-5ac5freepik-proxy.eltanorubino.workers.dev/v1",

  async generateImage(apiKey, prompt, options = {}) {
    try {
      const res = await fetch(`${this.baseUrl}/ai/text-to-image`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-freepik-api-key": apiKey },
        body: JSON.stringify({
          prompt,
                image: { size: options.aspect_ratio || "square_1_1" },
        }),
      });
      if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.message || `API Error: ${res.status}`);
             }
             const data = await res.json();
             if (data.data && data.data.length > 0) {
               return {
                 images: data.data.map((img, i) => ({
                   id: Date.now() + i,
                   src: `data:image/jpeg;base64,${img.base64}`,
                   prompt,
                 })),
               };
             }
             return { error: "No images returned" };
    } catch (e) {
      console.warn("Freepik API error:", e.message);
      return { error: e.message };
    }
  },

  async checkTask(apiKey, taskId) {
    try {
      const res = await fetch(`${this.baseUrl}/ai/text-to-image/${taskId}`, {
        headers: { "x-freepik-api-key": apiKey },
      });
      if (!res.ok) throw new Error(`API Error: ${res.status}`);
      return await res.json();
    } catch (e) {
      return { error: e.message };
    }
  },

  async searchResources(apiKey, query, type = "photo") {
    try {
      const res = await fetch(`${this.baseUrl}/resources?query=${encodeURIComponent(query)}&type=${type}&limit=20`, {
        headers: { "x-freepik-api-key": apiKey },
      });
      if (!res.ok) throw new Error(`API Error: ${res.status}`);
      return await res.json();
    } catch (e) {
      return { error: e.message };
    }
  },
};

  const avgRating = (REPUTATION_PLATFORMS.reduce((sum, p) => sum + p.locations.reduce((s, l) => s + l.rating * l.reviews, 0), 0) / totalReviews).toFixed(1);
  const newThisWeek = REPUTATION_PLATFORMS.reduce((sum, p) => sum + p.locations.reduce((s, l) => s + l.newReviews, 0), 0);
  const unreplied = RECENT_REVIEWS.filter(r => !r.replied).length;

  const filteredReviews = reviewFilter === "all" ? RECENT_REVIEWS :
    reviewFilter === "unreplied" ? RECENT_REVIEWS.filter(r => !r.replied) :
    RECENT_REVIEWS.filter(r => r.platform.toLowerCase().replace(" ", "") === reviewFilter);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      {/* KPI Row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
        <MetricCard icon={Star} label="Rating Promedio" value={avgRating} change="+0.1" changeType="up" color={COLORS.mustard} />
        <MetricCard icon={MessageSquare} label="Total Reviews" value={totalReviews.toLocaleString()} change={`+${newThisWeek} esta semana`} changeType="up" color={COLORS.navy} />
        <MetricCard icon={ThumbsUp} label="Response Rate" value="62%" change="+5%" changeType="up" color={COLORS.olive} />
        <MetricCard icon={AlertTriangle} label="Sin Responder" value={unreplied.toString()} change="Requiere atención" changeType="down" color={COLORS.negative} />
      </div>

      {/* Platform Cards — clickable links */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 16 }}>
        {REPUTATION_PLATFORMS.map((platform) => {
          const avgR = (platform.locations.reduce((s, l) => s + l.rating, 0) / platform.locations.length).toFixed(1);
          const totalR = platform.locations.reduce((s, l) => s + l.reviews, 0);
          const isSelected = selectedPlatform === platform.name;
          return (
            <div key={platform.name}
              onClick={() => setSelectedPlatform(isSelected ? null : platform.name)}
              style={{
                background: COLORS.white, borderRadius: 16, padding: 24, cursor: "pointer",
                boxShadow: isSelected ? `0 0 0 2px ${platform.color}` : "0 1px 3px rgba(0,0,0,0.06)",
                border: `1px solid ${isSelected ? platform.color : COLORS.lightGray}`,
                transition: "all 0.2s",
              }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <div style={{ background: platform.bg, width: 44, height: 44, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
                  <img src={platform.logo} alt={platform.name} style={{ width: 30, height: 30, objectFit: "contain" }} />
                </div>
                <a href={PLATFORM_LINKS[platform.name.toLowerCase().replace(" ", "")]?.[platform.locations[0].loc] || "#"} target="_blank" rel="noreferrer" onClick={(e) => e.stopPropagation()} style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 32, height: 32, borderRadius: 8, background: "#F3F4F6", textDecoration: "none" }} title={`Ver ${platform.name}`}>
                  <ExternalLink size={16} color="#9CA3AF" />
                </a>
              </div>
              <div style={{ fontSize: 18, fontWeight: 700, color: COLORS.navy, marginBottom: 2 }}>{platform.name}</div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 12 }}>
                <span style={{ fontSize: 28, fontWeight: 800, color: platform.color }}>{avgR}</span>
                <span style={{ fontSize: 13, color: "#9CA3AF" }}>/ 5.0</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#6B7280" }}>
                <span>{totalR.toLocaleString()} reviews</span>
                <span style={{ color: COLORS.positive, fontWeight: 600 }}>+{platform.locations.reduce((s,l) => s + l.newReviews, 0)} new</span>
              </div>
              {/* Location breakdown on click */}
              {isSelected && (
                <div style={{ marginTop: 16, borderTop: `1px solid ${COLORS.lightGray}`, paddingTop: 12 }}>
                  {platform.locations.map((loc) => (
                    <a key={loc.loc}
                      href={PLATFORM_LINKS[platform.name.toLowerCase().replace(" ", "")]?.[loc.loc] || "#"}
                      target="_blank" rel="noreferrer"
                      style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", textDecoration: "none", borderBottom: `1px solid ${COLORS.lightGray}` }}>

                        <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy }}>{loc.loc}</div>
                        <div style={{ fontSize: 11, color: "#9CA3AF" }}>{loc.reviews} reviews • Response: {loc.responseRate}%</div>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ fontSize: 16, fontWeight: 700, color: platform.color }}>{loc.rating}</span>
                        <span style={{ fontSize: 11, color: parseFloat(loc.trend) >= 0 ? COLORS.positive : COLORS.negative }}>
                          {parseFloat(loc.trend) >= 0 ? "▲" : "▼"} {loc.trend}
                        </span>
                        <ExternalLink size={12} color="#9CA3AF" />
                      </div>
                    </a>
                  ))}

      {/* Rating Trends + Sentiment */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <SectionCard title="Tendencia de Ratings" subtitle="Últimos 6 meses por plataforma">

            <LineChart data={RATING_TREND_DATA}>
              <CartesianGrid strokeDasharray="3 3" stroke="#E5E7EB" />
              <XAxis dataKey="month" tick={{ fontSize: 12 }} />
              <YAxis domain={[3, 5]} tick={{ fontSize: 12 }} />
              <Tooltip />
              <Line type="monotone" dataKey="google" stroke={COLORS.google} strokeWidth={2.5} dot={{ r: 4 }} name="Google" />
              <Line type="monotone" dataKey="yelp" stroke={COLORS.yelp} strokeWidth={2.5} dot={{ r: 4 }} name="Yelp" />
              <Line type="monotone" dataKey="tripadvisor" stroke={COLORS.tripadvisor} strokeWidth={2.5} dot={{ r: 4 }} name="TripAdvisor" />
              <Line type="monotone" dataKey="opentable" stroke={COLORS.opentable} strokeWidth={2.5} dot={{ r: 4 }} name="OpenTable" />
            </LineChart>
          </ResponsiveContainer>
        </SectionCard>

        <SectionCard title="Sentiment por Categoría" subtitle="Análisis de reviews agregado">
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

                  padding: "5px 12px", borderRadius: 16, fontSize: 12, fontWeight: 500, cursor: "pointer",

          </div>
        }>

                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <Badge text={review.platform} color={platColors[review.platform]} />
                    <span style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy }}>{review.author}</span>
                    <span style={{ fontSize: 12, color: "#9CA3AF" }}>— {review.loc}</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ display: "flex", gap: 2 }}>
                      {[1,2,3,4,5].map(s => (
                        <Star key={s} size={14} fill={s <= review.rating ? COLORS.mustard : "none"} color={s <= review.rating ? COLORS.mustard : "#D1D5DB"} />
                      ))}
                    </div>
                    {review.replied ? (
                      <Badge text="Respondido" color={COLORS.positive} />
                    ) : (
                      <Badge text="Pendiente" color={COLORS.negative} />
                    )}
                  </div>
                </div>
                <p style={{ margin: 0, fontSize: 14, color: COLORS.darkGray, lineHeight: 1.5 }}>{review.text}</p>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
                  <span style={{ fontSize: 12, color: "#9CA3AF" }}>{review.date}</span>
                  {!review.replied && (
                    <button onClick={() => { setReplyingTo(replyingTo === i ? null : i); setReplyText(""); }}
                      style={{ padding: "5px 14px", borderRadius: 8, background: COLORS.terracotta, color: COLORS.white, border: "none", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                      {replyingTo === i ? "Cancelar" : "Responder"}
                    </button>
                  )}
                </div>
                {replyingTo === i && (
                  <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 8 }}>
                    <textarea value={replyText} onChange={(e) => setReplyText(e.target.value)}
                      placeholder="Escribe tu respuesta..."
                      style={{ width: "100%", minHeight: 70, padding: 10, borderRadius: 8, border: "1px solid " + COLORS.lightGray, fontSize: 13, fontFamily: "inherit", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
                    <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                      <button onClick={() => setReplyingTo(null)}
                        style={{ padding: "6px 16px", borderRadius: 8, background: COLORS.lightGray, color: COLORS.darkGray, border: "none", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                        Cancelar
                      </button>
                      <button onClick={() => { if (replyText.trim()) { review.replied = true; review.response = replyText.trim(); setReplyingTo(null); setReplyText(""); } }}
                        style={{ padding: "6px 16px", borderRadius: 8, background: COLORS.terracotta, color: COLORS.white, border: "none", fontSize: 12, fontWeight: 600, cursor: "pointer", opacity: replyText.trim() ? 1 : 0.5 }}>
                        Enviar Respuesta
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </SectionCard>

      {/* Reputation Score Summary */}
      <div style={{ background: `linear-gradient(135deg, ${COLORS.navy}, #2D3F6A)`, borderRadius: 16, padding: 28, color: COLORS.white }}>
        <h3 style={{ margin: "0 0 16px", fontSize: 18 }}>Reputation Health Score</h3>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 16, textAlign: "center" }}>
          {[
            { label: "Rating Global", value: avgRating, max: "5.0", pct: (avgRating / 5 * 100) },
            { label: "Response Rate", value: "62%", max: "100%", pct: 62 },
            { label: "Sentiment", value: "81%", max: "100%", pct: 81 },
            { label: "Review Volume", value: "137/mo", max: "Top 10%", pct: 78 },
            { label: "Health Score", value: "B+", max: "A+", pct: 82 },
          ].map((m) => (
            <div key={m.label}>
              <div style={{ fontSize: 28, fontWeight: 800 }}>{m.value}</div>
              <div style={{ fontSize: 12, opacity: 0.7, marginBottom: 8 }}>{m.label}</div>
              <div style={{ height: 4, background: "rgba(255,255,255,0.2)", borderRadius: 2 }}>
                <div style={{ height: "100%", width: `${m.pct}%`, background: COLORS.mustard, borderRadius: 2 }} />
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  const [generatingImage, setGeneratingImage] = useState(false);
  const [generatedImages, setGeneratedImages] = useState([]);
  const [selectedEngine, setSelectedEngine] = useState("sharpy");
  const [selectedRatio, setSelectedRatio] = useState("square_1_1");
  const [showTemplates, setShowTemplates] = useState(true);
  const [postImage, setPostImage] = useState(null);
  const [editingImage, setEditingImage] = useState(null);
  const [imageAdjustments, setImageAdjustments] = useState({ brightness: 100, contrast: 100, saturate: 100 });

  const [postHistory, setPostHistory] = useState(function() { try { return JSON.parse(localStorage.getItem("ohPostHistory") || "[]"); } catch(e) { return []; } });
  const [showHistory, setShowHistory] = useState(false);

  var savePost = function(status) {
    var newPost = {
      id: Date.now(),
      type: postType,
      pillar: selectedPillar,
      caption: caption,
      hashtags: hashtags,
      image: postImage,
      engine: selectedEngine,
      ratio: selectedRatio,
      status: status,
      date: new Date().toISOString()
    };
    var updated = [newPost].concat(postHistory);
    setPostHistory(updated);
    try { localStorage.setItem("ohPostHistory", JSON.stringify(updated)); } catch(e) {}
    alert(status === "draft" ? "Borrador guardado" : "Post programado");
  };

  const PROMPT_SUGGESTIONS = {
    "Menú": [
      "Overhead shot of signature Mexican dish on rustic table, garnished with fresh cilantro and lime, warm restaurant lighting, professional food photography",
      "Close-up of sizzling fajitas with steam rising, colorful peppers and onions, dark moody background, dramatic lighting",
      "Beautifully plated Mexican dessert, churros with chocolate sauce, vibrant colors, shallow depth of field",
    ],
    "Lifestyle": [
      "Friends toasting margaritas at outdoor Mexican restaurant terrace, Miami Beach sunset, warm golden hour lighting, candid lifestyle photography",
      "Couple enjoying dinner at romantic Mexican restaurant, string lights, candles, South Beach ambiance",
      "Group of friends sharing a molcajete, laughing, vibrant restaurant atmosphere, lifestyle editorial style",
    ],
    "Promociones": [
      "Festive taco spread with happy hour vibes, colorful cocktails, chips and salsa, warm inviting lighting, promotional food photography",
      "Mexican fiesta table setup with margarita pitchers and appetizers, party atmosphere, bright and energetic",
      "Brunch scene with Mexican breakfast plates, mimosas, fresh fruit, bright natural light, lifestyle promotional",
    ],
    "Comunidad": [
      "Diverse group of people enjoying Mexican food together, community table, warm atmosphere, inclusive and welcoming",
      "Local neighborhood gathering at Mexican restaurant, outdoor seating, Miami street scene, documentary style",
      "Staff members preparing food with passion, teamwork in kitchen, authentic behind-the-scenes moment",
    ],
    "Autenticidad": [
      "Artisan chef hand-pressing tortillas in traditional Mexican kitchen, flour dusting, close-up hands, authentic documentary",
      "Traditional Mexican ingredients arranged beautifully, dried chilies, spices, fresh produce, rustic wooden surface",
      "Vintage-style photo of Mexican cooking traditions, warm nostalgic tones, cultural heritage",
    ],
  };

  const enhancePrompt = (basicPrompt) => {
    const enhancers = ["professional food photography", "warm ambient lighting", "shallow depth of field", "vibrant colors", "high resolution"];
    const ratio = selectedRatio.includes("portrait") ? "vertical composition" : selectedRatio.includes("wide") ? "wide cinematic composition" : "square centered composition";
    return basicPrompt + ", " + ratio + ", " + enhancers.slice(0, 4).join(", ");
  };

  const POST_TEMPLATES = [
    { name: "Taco Tuesday", pillar: "Promociones", caption: "It's TACO TUESDAY! All tacos $3 from 4-7PM. Which one are you getting?", hashtags: "#TacoTuesday #Pomona #MiamiDeals #TacoLovers", imagePrompt: "Vibrant overhead shot of 6 different Mexican tacos arranged in a circle on a rustic wooden board, colorful salsas, lime wedges, festive lighting, restaurant atmosphere, food photography" },
    { name: "Margarita Feature", pillar: "Menú", caption: "150+ tequilas. 50,000+ margaritas sold yearly. Award-winning for a reason.", hashtags: "#Margarita #BestMargaritas #MiamiDrinks #TequilaLovers #Pomona", imagePrompt: "Stunning close-up of a vibrant margarita cocktail with salt rim, lime garnish, splash effect, Mexican restaurant bar background with warm lighting, professional cocktail photography" },
    { name: "Behind the Scenes", pillar: "Autenticidad", caption: "Desde 1997, cada plato se prepara con amor. Peek inside our kitchen.", hashtags: "#BehindTheScenes #MexicanCooking #AuthenticMexican #ChefLife #Pomona", imagePrompt: "Candid kitchen shot of chef preparing molcajete in authentic Mexican restaurant kitchen, steam rising, vibrant ingredients, warm lighting, documentary style" },
    { name: "Location Showcase", pillar: "Lifestyle", caption: "3 locations. 1 unforgettable experience. Española Way, Ocean Drive, Lincoln Road.", hashtags: "#SouthBeach #MiamiBeach #Pomona #EspanolaWay #OceanDrive #LincolnRoad", imagePrompt: "Beautiful exterior shot of a Mexican restaurant on a vibrant Miami Beach street at golden hour, palm trees, neon lights, festive atmosphere, travel photography" },
    { name: "Molcajete Hero", pillar: "Menú", caption: "Served in a volcanic stone bowl, our Molcajete is a feast for all senses.", hashtags: "#Molcajete #ColdPressedJuice #FoodPorn #MiamiFoodie #Pomona", imagePrompt: "Dramatic close-up of a sizzling molcajete dish in volcanic stone bowl, steam rising, grilled meats, cactus, cheese, peppers, dark moody food photography with warm accents" },
    { name: "Happy Hour", pillar: "Promociones", caption: "Mexican Fiesta Happy Hour Mon-Fri 4-7PM. The perfect start to your evening.", hashtags: "#HappyHour #MiamiHappyHour #Cocktails #Pomona #AfterWork", imagePrompt: "Festive happy hour scene at a Mexican restaurant bar, colorful cocktails lined up, chips and guacamole, warm sunset light through windows, social atmosphere" },
  ];

  const handleGenerateImage = async () => {
    if (!freepikKey || !imagePrompt) return;
    setGeneratingImage(true);
    const result = await FreepikAPI.generateImage(freepikKey, imagePrompt, {
      engine: selectedEngine,
      aspect_ratio: selectedRatio,
    });
    if (result && !result.error && result.images) {
      setGeneratedImages(prev => [...result.images, ...prev]);
    } else if (result && result.error) {
      console.warn("Generation failed:", result.error);
    }
    setGeneratingImage(false);
  };

  const applyTemplate = (template) => {
    setCaption(template.caption);
    setHashtags(template.hashtags);
    setImagePrompt(template.imagePrompt);
    setSelectedPillar(template.pillar);
    setShowTemplates(false);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 20, color: COLORS.navy }}>Crear Post</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: "#9CA3AF" }}>Diseña y genera contenido con Freepik AI</p>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 20, background: freepikConnected ? "#16a34a22" : "#dc262622", border: `1px solid ${freepikConnected ? "#16a34a" : "#dc2626"}44` }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: freepikConnected ? "#16a34a" : "#dc2626" }} />
            <span style={{ fontSize: 12, fontWeight: 600, color: freepikConnected ? "#16a34a" : "#dc2626" }}>
              {freepikConnected ? "Freepik Connected" : "Freepik Disconnected"}
            </span>
          </div>
        </div>
      </div>

      {/* Freepik API Config */}
      {!freepikConnected && (
        <SectionCard title="Conectar Freepik API" style={{ background: `${COLORS.info}06`, border: `1px solid ${COLORS.info}25` }}>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <input
              type="text" placeholder="Freepik API Key (x-freepik-api-key)" value={freepikKey}
              onChange={(e) => setFreepikKey(e.target.value)}
              style={{ flex: 1, padding: "10px 14px", borderRadius: 10, border: `1px solid ${COLORS.lightGray}`, fontSize: 14, outline: "none" }}
            />
            <button onClick={() => { if (freepikKey.length > 5) { localStorage.setItem("ohm_freepik_key", freepikKey); setFreepikConnected(true); } }}
              style={{ padding: "10px 20px", borderRadius: 10, background: COLORS.terracotta, color: COLORS.white, border: "none", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
              Conectar
            </button>
          </div>
          <p style={{ margin: "8px 0 0", fontSize: 12, color: "#9CA3AF" }}>
            Obtén tu API key en <a href="https://www.freepik.com/developers/dashboard" target="_blank" rel="noreferrer" style={{ color: COLORS.terracotta }}>freepik.com/developers</a>
          </p>
        </SectionCard>
      )}

      {/* Quick Templates */}
      {showTemplates && (
        <SectionCard title="Templates Rápidos" subtitle="Selecciona uno para empezar rápido"
          action={<button onClick={() => setShowTemplates(false)} style={{ fontSize: 12, color: "#9CA3AF", background: "none", border: "none", cursor: "pointer" }}>Empezar desde cero</button>}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
            {POST_TEMPLATES.map((tmpl) => (
              <div key={tmpl.name} onClick={() => applyTemplate(tmpl)}
                style={{ padding: 16, borderRadius: 12, border: `1px solid ${COLORS.lightGray}`, cursor: "pointer", transition: "all 0.2s" }}
                onMouseEnter={(e) => e.currentTarget.style.borderColor = COLORS.terracotta}
                onMouseLeave={(e) => e.currentTarget.style.borderColor = COLORS.lightGray}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <h4 style={{ margin: 0, fontSize: 14, color: COLORS.navy }}>{tmpl.name}</h4>
                  <Badge text={tmpl.pillar} color={COLORS.terracotta} />
                </div>
                <p style={{ margin: 0, fontSize: 12, color: "#6B7280", lineHeight: 1.4 }}>{tmpl.caption.slice(0, 80)}...</p>
              </div>
            ))}
          </div>
        </SectionCard>
      )}

      {/* Post Builder */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        {/* Left: Content Editor */}
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <SectionCard title="Contenido del Post">
            {/* Post Type */}
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy, display: "block", marginBottom: 8 }}>Tipo de Post</label>
              <div style={{ display: "flex", gap: 8 }}>
                {[
                  { id: "feed", label: "Feed", icon: "🖼️" },
                  { id: "reel", label: "Reel", icon: "🎬" },
                  { id: "carousel", label: "Carousel", icon: "📸" },
                  { id: "story", label: "Story", icon: "📱" },
                ].map((t) => (
                  <button key={t.id} onClick={() => setPostType(t.id)}
                    style={{
                      flex: 1, padding: "10px", borderRadius: 10, border: `1px solid ${postType === t.id ? COLORS.terracotta : COLORS.lightGray}`,
                      background: postType === t.id ? `${COLORS.terracotta}10` : COLORS.white,
                      cursor: "pointer", textAlign: "center",
                    }}>
                    <div style={{ fontSize: 20, marginBottom: 4 }}>{t.icon}</div>
                    <div style={{ fontSize: 12, fontWeight: 600, color: postType === t.id ? COLORS.terracotta : COLORS.darkGray }}>{t.label}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Pillar */}
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy, display: "block", marginBottom: 8 }}>Pilar de Contenido</label>
              <div style={{ display: "flex", gap: 6 }}>
                {CONTENT_PILLARS.map((p) => (
                  <button key={p.name} onClick={() => setSelectedPillar(p.name)}
                    style={{
                      padding: "6px 14px", borderRadius: 20, fontSize: 12, fontWeight: 500, cursor: "pointer",
                      background: selectedPillar === p.name ? p.color : COLORS.lightGray,
                      color: selectedPillar === p.name ? COLORS.white : COLORS.darkGray,
                      border: "none",
                    }}>
                    {p.name}
                  </button>
                ))}
              </div>
            </div>

            {/* Caption */}
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy, display: "block", marginBottom: 8 }}>Caption</label>
              <textarea value={caption} onChange={(e) => setCaption(e.target.value)}
                placeholder="Escribe tu caption aquí..."
                style={{ width: "100%", minHeight: 100, padding: 12, borderRadius: 10, border: `1px solid ${COLORS.lightGray}`, fontSize: 14, resize: "vertical", outline: "none", fontFamily: "inherit", boxSizing: "border-box" }}
              />
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
                <span style={{ fontSize: 11, color: "#9CA3AF" }}>{caption.length} caracteres</span>
                <span style={{ fontSize: 11, color: caption.length > 2200 ? COLORS.negative : "#9CA3AF" }}>Límite: 2,200</span>
              </div>
            </div>

            {/* Hashtags */}
            <div>
              <label style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy, display: "block", marginBottom: 8 }}>Hashtags</label>
              <textarea value={hashtags} onChange={(e) => setHashtags(e.target.value)}
                style={{ width: "100%", minHeight: 50, padding: 12, borderRadius: 10, border: `1px solid ${COLORS.lightGray}`, fontSize: 13, resize: "vertical", outline: "none", fontFamily: "inherit", color: COLORS.terracotta, boxSizing: "border-box" }}
              />
            </div>
          </SectionCard>
        </div>

        {/* Right: Image Generator */}
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <SectionCard title="Generar Imagen" subtitle="Powered by Freepik AI (Mystic)">
            {/* Engine Selection */}
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy, display: "block", marginBottom: 8 }}>Motor AI</label>
              <div style={{ display: "flex", gap: 8 }}>
                {[
                  { id: "sharpy", label: "Sharpy", desc: "Foto realista" },
                  { id: "illusio", label: "Illusio", desc: "Ilustraciones" },
                  { id: "sparkle", label: "Sparkle", desc: "Equilibrado" },
                ].map((e) => (
                  <button key={e.id} onClick={() => setSelectedEngine(e.id)}
                    style={{
                      flex: 1, padding: "10px", borderRadius: 10, textAlign: "center", cursor: "pointer",
                      border: `1px solid ${selectedEngine === e.id ? COLORS.olive : COLORS.lightGray}`,
                      background: selectedEngine === e.id ? `${COLORS.olive}10` : COLORS.white,
                    }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: selectedEngine === e.id ? COLORS.olive : COLORS.darkGray }}>{e.label}</div>
                    <div style={{ fontSize: 11, color: "#9CA3AF" }}>{e.desc}</div>
                  </button>
                ))}
              </div>
            </div>

            {/* Aspect Ratio */}
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy, display: "block", marginBottom: 8 }}>Formato</label>
              <div style={{ display: "flex", gap: 8 }}>
                {[
                  { id: "square_1_1", label: "1:1", desc: "Feed" },
                  { id: "portrait_4_5", label: "4:5", desc: "Portrait" },
                  { id: "portrait_9_16", label: "9:16", desc: "Story/Reel" },
                  { id: "widescreen_16_9", label: "16:9", desc: "Landscape" },
                ].map((r) => (
                  <button key={r.id} onClick={() => setSelectedRatio(r.id)}
                    style={{
                      flex: 1, padding: "8px", borderRadius: 8, textAlign: "center", cursor: "pointer",
                      border: `1px solid ${selectedRatio === r.id ? COLORS.mustard : COLORS.lightGray}`,
                      background: selectedRatio === r.id ? `${COLORS.mustard}10` : COLORS.white,
                      fontSize: 12, fontWeight: selectedRatio === r.id ? 600 : 400,
                      color: selectedRatio === r.id ? COLORS.mustard : COLORS.darkGray,
                    }}>
                    {r.label}<br /><span style={{ fontSize: 10, color: "#9CA3AF" }}>{r.desc}</span>
                  </button>
                ))}
              </div>
            </div>

            {/* Image Prompt */}
            <div style={{ marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <label style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy }}>Prompt de Imagen</label>
                <button onClick={() => { if (imagePrompt) setImagePrompt(enhancePrompt(imagePrompt)); }}
                  disabled={!imagePrompt}
                  style={{ display: "flex", alignItems: "center", gap: 4, padding: "4px 10px", borderRadius: 6, border: `1px solid ${COLORS.mustard}`, background: `${COLORS.mustard}10`, color: COLORS.mustard, fontSize: 11, fontWeight: 600, cursor: imagePrompt ? "pointer" : "default", opacity: imagePrompt ? 1 : 0.4 }}>
                  <Sparkles size={12} /> Mejorar prompt
                </button>
              </div>
              <textarea value={imagePrompt} onChange={(e) => setImagePrompt(e.target.value)}
                placeholder="Describe la imagen que quieres generar... Sé específico con colores, ángulos, estilo y ambiente."
                style={{ width: "100%", minHeight: 80, padding: 12, borderRadius: 10, border: `1px solid ${COLORS.lightGray}`, fontSize: 13, resize: "vertical", outline: "none", fontFamily: "inherit", boxSizing: "border-box" }}
              />
              {!imagePrompt && PROMPT_SUGGESTIONS[selectedPillar] && (
                <div style={{ marginTop: 8 }}>
                  <span style={{ fontSize: 11, color: "#9CA3AF", fontWeight: 600 }}>Sugerencias para {selectedPillar}:</span>
                  <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 4 }}>
                    {PROMPT_SUGGESTIONS[selectedPillar].map((sug, i) => (
                      <button key={i} onClick={() => setImagePrompt(sug)}
                        style={{ textAlign: "left", padding: "6px 10px", borderRadius: 6, border: `1px solid ${COLORS.lightGray}`, background: COLORS.white, fontSize: 11, color: COLORS.darkGray, cursor: "pointer", lineHeight: 1.3 }}>
                        {sug.slice(0, 80)}...
                      </button>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <button onClick={handleGenerateImage} disabled={generatingImage || !imagePrompt}
              style={{
                width: "100%", padding: "12px", borderRadius: 10, border: "none", cursor: generatingImage ? "wait" : "pointer",
                background: generatingImage ? "#9CA3AF" : `linear-gradient(135deg, ${COLORS.terracotta}, ${COLORS.accent1})`,
                color: COLORS.white, fontWeight: 700, fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
              }}>
              {generatingImage ? <RefreshCw size={16} style={{ animation: "spin 1s linear infinite" }} /> : <Wand2 size={16} />}
              {generatingImage ? "Generando..." : "Generar con Freepik AI"}
            </button>

            {/* Generated Images Preview Area */}
            <div style={{ marginTop: 16, minHeight: 160, border: `2px dashed ${COLORS.lightGray}`, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 8, padding: 20 }}>
              {generatedImages.length === 0 ? (
                <>
                  <Image size={32} color="#D1D5DB" />
                  <span style={{ fontSize: 13, color: "#9CA3AF" }}>Las imágenes generadas aparecerán aquí</span>
                  <span style={{ fontSize: 11, color: "#D1D5DB" }}>Escribí un prompt y hacé click en Generar</span>
                </>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 12, width: "100%" }}>
                  <p style={{ fontSize: 13, color: COLORS.positive, fontWeight: 600, textAlign: "center" }}>{generatedImages.length} imagen(es) generada(s)</p>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 10 }}>
                    {generatedImages.map(img => (
                      <div key={img.id} style={{ borderRadius: 10, overflow: "hidden", border: (editingImage && editingImage.id === img.id) ? `2px solid ${COLORS.terracotta}` : "1px solid #E5E7EB", cursor: "pointer", position: "relative" }}
                        onClick={function() { setPostImage(img.src); setEditingImage(img); setImageAdjustments({ brightness: 100, contrast: 100, saturate: 100 }); }}>
                        <img src={img.src} alt={img.prompt} style={{ width: "100%", height: "auto", display: "block" }} />
                        {editingImage && editingImage.id === img.id && (
                          <div style={{ position: "absolute", top: 4, right: 4, width: 20, height: 20, borderRadius: "50%", background: COLORS.terracotta, display: "flex", alignItems: "center", justifyContent: "center" }}>
                            <CheckCircle size={12} color="white" />
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </SectionCard>

          {editingImage && (
            <SectionCard title="Ajustes de Imagen" subtitle="Editá, regenerá o pedí variaciones">
              <div style={{ borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
                <img src={editingImage.src} alt="Editing" style={{ width: "100%", height: "auto", display: "block", filter: `brightness(${imageAdjustments.brightness}%) contrast(${imageAdjustments.contrast}%) saturate(${imageAdjustments.saturate}%)` }} />
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
                {[{ key: "brightness", label: "Brillo", icon: "☀️" }, { key: "contrast", label: "Contraste", icon: "◑" }, { key: "saturate", label: "Saturación", icon: "🎨" }].map(adj => (
                  <div key={adj.key} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 12, width: 80, color: COLORS.darkGray }}>{adj.icon} {adj.label}</span>
                    <input type="range" min="50" max="150" value={imageAdjustments[adj.key]} onChange={(e) => setImageAdjustments(prev => ({ ...prev, [adj.key]: Number(e.target.value) }))} style={{ flex: 1, accentColor: COLORS.terracotta }} />
                    <span style={{ fontSize: 11, color: "#9CA3AF", width: 32, textAlign: "right" }}>{imageAdjustments[adj.key]}%</span>
                  </div>
                ))}
                <button onClick={() => setImageAdjustments({ brightness: 100, contrast: 100, saturate: 100 })} style={{ alignSelf: "flex-end", fontSize: 11, color: "#9CA3AF", background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>Resetear</button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <button onClick={() => { const np = prompt("Editá el prompt para regenerar:", editingImage.prompt || imagePrompt); if (np) setImagePrompt(np); }} style={{ width: "100%", padding: "10px", borderRadius: 8, border: `1px solid ${COLORS.navy}`, background: COLORS.white, color: COLORS.navy, fontWeight: 600, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}><PenTool size={14} /> Editar prompt y regenerar</button>
                <button onClick={async () => { const vp = (editingImage.prompt || imagePrompt) + ", alternative angle, different composition, slight variation"; setGeneratingImage(true); const result = await FreepikAPI.generateImage(freepikKey, vp, { engine: selectedEngine, aspect_ratio: selectedRatio }); if (result && !result.error && result.images) setGeneratedImages(prev => [...result.images, ...prev]); setGeneratingImage(false); }} disabled={generatingImage} style={{ width: "100%", padding: "10px", borderRadius: 8, border: `1px solid ${COLORS.olive}`, background: `${COLORS.olive}10`, color: COLORS.olive, fontWeight: 600, fontSize: 13, cursor: generatingImage ? "wait" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}><RefreshCw size={14} /> Generar variación</button>
                <button onClick={() => { const canvas = document.createElement("canvas"); const im = new window.Image(); im.crossOrigin = "anonymous"; im.onload = () => { canvas.width = im.width; canvas.height = im.height; const ctx = canvas.getContext("2d"); ctx.filter = `brightness(${imageAdjustments.brightness}%) contrast(${imageAdjustments.contrast}%) saturate(${imageAdjustments.saturate}%)`; ctx.drawImage(im, 0, 0); setPostImage(canvas.toDataURL("image/jpeg", 0.95)); }; im.src = editingImage.src; }} style={{ width: "100%", padding: "10px", borderRadius: 8, border: "none", background: `linear-gradient(135deg, ${COLORS.terracotta}, ${COLORS.accent1})`, color: COLORS.white, fontWeight: 600, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}><CheckCircle size={14} /> Usar en post (con ajustes)</button>
              </div>
            </SectionCard>
          )}
        </div>
      </div>

        function compressDataUrl(dataUrl, maxW, quality) {

            var img = new Image();
            img.onload = function() {
              var cv = document.createElement("canvas");

            img.onerror = function() { resolve(null); };
            img.src = dataUrl;

  useEffect(() => {

      Google: { icon: "G", color: COLORS.google, bg: "#4285F415" },
      Yelp: { icon: "Y", color: COLORS.yelp, bg: "#D3232315" },

    fetch("data.json?" + Date.now())
      .then(r => { if (!r.ok) throw new Error("No data.json"); return r.json(); })
      .then(data => {
        if (data.reputation) {
          if (data.reputation.platforms) {
            REPUTATION_PLATFORMS = data.reputation.platforms.map(p => ({
              ...p,
              ...(PLATFORM_UI[p.name] || { icon: p.name[0], color: "#666", bg: "#66666615" }),
            }));
          }
          if (data.reputation.recentReviews) RECENT_REVIEWS = data.reputation.recentReviews;
          if (data.reputation.ratingTrend) RATING_TREND_DATA = data.reputation.ratingTrend;
          if (data.reputation.sentiment) REVIEW_SENTIMENT_DATA = data.reputation.sentiment;
          if (data.reputation.keywords) REVIEW_KEYWORDS = data.reputation.keywords;
        }
        if (data.intelligence) {
          if (data.intelligence.trendingTopics) TRENDING_TOPICS = data.intelligence.trendingTopics;
          if (data.intelligence.competitors) COMPETITORS = data.intelligence.competitors;
          if (data.intelligence.competitorActivity) COMPETITOR_DAILY_ACTIVITY = data.intelligence.competitorActivity;
          if (data.intelligence.competitorPosts) COMP_RECENT_POSTS = data.intelligence.competitorPosts;
          if (data.intelligence.industryInsights) {
            INDUSTRY_INSIGHTS = data.intelligence.industryInsights.map(ins => ({
              ...ins,
              icon: ICON_MAP[ins.iconName] || Sparkles,
            }));
          }
        }
        if (data.locations) LOCATIONS_DATA = data.locations;
        if (data.lastUpdated) setDataLastUpdated(data.lastUpdated);
        setDataVersion(v => v + 1);
      })
      .catch(() => { /* Use hardcoded fallback data */ });
  }, []);

  const tabs = [
    { id: "overview", label: "Overview", icon: BarChart3 },
    { id: "reputation", label: "Reputación", icon: Shield },
    { id: "content", label: "Contenido", icon: Grid3X3 },
    { id: "calendar", label: "Calendario", icon: Calendar },
    { id: "intelligence", label: "Inteligencia", icon: Target },
    { id: "creator", label: "Crear Post", icon: PenTool },
    { id: "media", label: "Media Library", icon: Database },
    { id: "locations", label: "Locaciones", icon: MapPin },
  ];

  const avgEngRate = ((totalEngagement / DEMO_POSTS.reduce((s, p) => s + p.reach, 0)) * 100).toFixed(1);
  const totalReach = DEMO_POSTS.reduce((s, p) => s + p.reach, 0);
  const bestPost = DEMO_POSTS.reduce((a, b) => (a.reach > b.reach ? a : b));
  const MONTH_NAMES = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
  const calMonthName = MONTH_NAMES[calendarMonth];
  const calFirstDay = new Date(calendarYear, calendarMonth, 1).getDay();
  const calDaysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
  const calStartOffset = calFirstDay === 0 ? 6 : calFirstDay - 1;
  const calMonthStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, "0")}`;

                    <textarea value={newEvent.caption} onChange={(e) => setNewEvent({...newEvent, caption: e.target.value})} placeholder="Escribe el caption del post..."
                      style={{ width: "100%", minHeight: 60, padding: "8px 12px", borderRadius: 8, border: "1px solid " + COLORS.lightGray, fontSize: 13, fontFamily: "inherit", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
                  </div>
                  <div style={{ gridColumn: "1 / -1" }}>
                    <label style={{ fontSize: 12, fontWeight: 600, color: COLORS.navy, display: "block", marginBottom: 4 }}>Hashtags</label>
                    <input value={newEvent.hashtags} onChange={(e) => setNewEvent({...newEvent, hashtags: e.target.value})} placeholder="#Pomona #HealthyLiving"
                      style={{ width: "100%", padding: "8px 12px", borderRadius: 8, border: "1px solid " + COLORS.lightGray, fontSize: 13, outline: "none", boxSizing: "border-box" }} />
                  </div>
                </div>
                <button onClick={() => {
                  if (!newEvent.title.trim()) { alert("Agrega un título"); return; }
                  const dateVal = document.getElementById("calNewEventDate").value;
                  if (editingEventIdx !== null) {
                    CALENDAR_ITEMS[editingEventIdx] = { date: dateVal, title: newEvent.title, type: newEvent.type, status: newEvent.status, pillar: newEvent.pillar, caption: newEvent.caption, hashtags: newEvent.hashtags };
                    setEditingEventIdx(null);
                  } else {
                    CALENDAR_ITEMS.push({ date: dateVal, title: newEvent.title, type: newEvent.type, status: newEvent.status, pillar: newEvent.pillar, caption: newEvent.caption, hashtags: newEvent.hashtags });
                  }
                  setNewEvent({ title: "", type: "Feed", status: "idea", pillar: "Menú", caption: "", hashtags: "" });
                  setShowAddEvent(false);
                  setDataVersion(v => v + 1);
                  const d = parseInt(dateVal.slice(8));
                  setSelectedCalDay(d);
                }}
                  style={{ marginTop: 12, padding: "10px 24px", borderRadius: 8, background: COLORS.terracotta, color: COLORS.white, border: "none", fontWeight: 600, fontSize: 14, cursor: "pointer", width: "100%" }}>
                  {editingEventIdx !== null ? "Guardar Cambios" : "Agregar al Calendario"}
                </button>
              </SectionCard>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
              {["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"].map((d) => (
                <div key={d} style={{ textAlign: "center", fontSize: 12, fontWeight: 600, color: "#9CA3AF", padding: "8px 0" }}>{d}</div>
              ))}
              {Array.from({ length: calStartOffset }).map((_, i) => (
                <div key={`empty-${i}`} style={{ minHeight: 80, background: "#F3F4F6", borderRadius: 8 }} />
              ))}
              {Array.from({ length: calDaysInMonth }).map((_, i) => {
                const day = i + 1;
                const dayItems = calItemsByDate[day] || [];
                const isToday = calendarYear === 2026 && calendarMonth === 2 && day === 28;
                const isSelected = selectedCalDay === day;
                const sc = { draft: "#FCD34D", approved: "#86EFAC", scheduled: "#93C5FD", idea: "#D1D5DB", published: "#A78BFA" };
                return (
                  <div key={day} onClick={() => setSelectedCalDay(isSelected ? null : day)}
                    style={{ minHeight: 80, background: isSelected ? `${COLORS.navy}08` : COLORS.white, borderRadius: 8, padding: "6px 8px", border: isSelected ? `2px solid ${COLORS.terracotta}` : isToday ? `2px solid ${COLORS.navy}` : `1px solid ${COLORS.lightGray}`, cursor: "pointer", display: "flex", flexDirection: "column", gap: 3, transition: "all 0.15s" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 13, fontWeight: isToday ? 800 : 600, color: isToday ? COLORS.terracotta : COLORS.navy }}>{day}</span>
                      {dayItems.length > 0 && <span style={{ fontSize: 10, color: "#9CA3AF" }}>{dayItems.length}</span>}
                    </div>
                    {dayItems.slice(0, 2).map((item, idx) => (
                      <div key={idx} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                        <div style={{ width: 6, height: 6, borderRadius: 2, background: sc[item.status], flexShrink: 0 }} />
                        <span style={{ fontSize: 10, color: COLORS.darkGray, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.title.length > 20 ? item.title.slice(0, 20) + "..." : item.title}</span>
                      </div>
                    ))}
                    {dayItems.length > 2 && <span style={{ fontSize: 9, color: "#9CA3AF" }}>+{dayItems.length - 2} más</span>}
                  </div>
                );
              })}
            </div>
            {selectedCalDay && (
              <SectionCard title={`${selectedCalDay} de ${calMonthName} ${calendarYear}`} style={{ border: `2px solid ${COLORS.terracotta}30`, background: `${COLORS.terracotta}04` }}>
                {selectedDayItems.length === 0 ? (
                  <p style={{ color: "#9CA3AF", fontSize: 14, textAlign: "center", padding: 20 }}>No hay contenido programado para este día.</p>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                    {selectedDayItems.map((item, idx) => {
                      const sc2 = { draft: "#FCD34D", approved: "#86EFAC", scheduled: "#93C5FD", idea: "#D1D5DB", published: "#A78BFA" };
                      const sl2 = { draft: "Borrador", approved: "Aprobado", scheduled: "Programado", idea: "Idea", published: "Publicado" };
                      return (
                        <div key={idx} style={{ background: COLORS.white, borderRadius: 12, padding: 16, border: `1px solid ${COLORS.lightGray}` }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                              <span style={{ background: sc2[item.status], padding: "3px 10px", borderRadius: 10, fontSize: 11, fontWeight: 600 }}>{sl2[item.status]}</span>
                              <span style={{ background: `${COLORS.navy}10`, padding: "3px 10px", borderRadius: 10, fontSize: 11, fontWeight: 600, color: COLORS.navy }}>{item.type}</span>
                              <span style={{ background: `${COLORS.terracotta}15`, padding: "3px 10px", borderRadius: 10, fontSize: 11, fontWeight: 600, color: COLORS.terracotta }}>{item.pillar}</span>
                            </div>
                            <div style={{ display: "flex", gap: 6 }}>
                              <button onClick={() => { const ci = CALENDAR_ITEMS.findIndex(c => c.date === item.date && c.title === item.title); if (ci > -1) { setNewEvent({ title: item.title, type: item.type, status: item.status, pillar: item.pillar || "Menú", caption: item.caption || "", hashtags: item.hashtags || "" }); setEditingEventIdx(ci); setShowAddEvent(true); } }} style={{ padding: "3px 10px", borderRadius: 8, background: COLORS.navy + "10", color: COLORS.navy, border: "none", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Editar</button>
                              <button onClick={() => { if (confirm("¿Eliminar este evento?")) { const ci = CALENDAR_ITEMS.findIndex(c => c.date === item.date && c.title === item.title); if (ci > -1) { CALENDAR_ITEMS.splice(ci, 1); setDataVersion(v => v + 1); } } }} style={{ padding: "3px 10px", borderRadius: 8, background: "#FEE2E2", color: "#DC2626", border: "none", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>Eliminar</button>
                            </div>
                          </div>
                          <h4 style={{ margin: "0 0 8px", fontSize: 15, fontWeight: 700, color: COLORS.navy }}>{item.title}</h4>
                          {item.caption && <p style={{ margin: "0 0 8px", fontSize: 13, color: COLORS.darkGray, lineHeight: 1.5 }}>{item.caption}</p>}
                          {item.hashtags && <p style={{ margin: 0, fontSize: 12, color: COLORS.terracotta, fontWeight: 500 }}>{item.hashtags}</p>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </SectionCard>
            )}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 12 }}>
              {[
                { label: "Ideas", count: CALENDAR_ITEMS.filter(c => c.date.startsWith(calMonthStr) && c.status === "idea").length, color: "#D1D5DB" },
                { label: "Borradores", count: CALENDAR_ITEMS.filter(c => c.date.startsWith(calMonthStr) && c.status === "draft").length, color: "#FCD34D" },
                { label: "Aprobados", count: CALENDAR_ITEMS.filter(c => c.date.startsWith(calMonthStr) && c.status === "approved").length, color: "#86EFAC" },
                { label: "Programados", count: CALENDAR_ITEMS.filter(c => c.date.startsWith(calMonthStr) && c.status === "scheduled").length, color: "#93C5FD" },
                { label: "Publicados", count: CALENDAR_ITEMS.filter(c => c.date.startsWith(calMonthStr) && c.status === "published").length, color: "#A78BFA" },
              ].map((s) => (
                <div key={s.label} style={{ background: COLORS.white, borderRadius: 12, padding: 16, textAlign: "center", borderTop: `3px solid ${s.color}`, boxShadow: "0 1px 3px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontSize: 28, fontWeight: 700, color: COLORS.navy }}>{s.count}</div>
                  <div style={{ fontSize: 13, color: "#6B7280" }}>{s.label}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* === INTELLIGENCE === */}
        {activeTab === "intelligence" && <IntelligenceTab />}

        {/* === POST CREATOR === */}
        {activeTab === "creator" && <PostCreatorTab />}

        {/* === MEDIA LIBRARY === */}
        {activeTab === "media" && <MediaLibraryTab />}

        {/* === LOCATIONS === */}
        {activeTab === "locations" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            <h2 style={{ margin: 0, fontSize: 20, color: COLORS.navy }}>Performance por Locación</h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
              {LOCATIONS_DATA.map((loc) => (
                <SectionCard key={loc.name} style={{ padding: 0, overflow: "hidden" }}>
                  <div style={{ position: "relative", width: "100%", height: 140, overflow: "hidden" }}>
                    <img src={loc.photo} alt={loc.name} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                    <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 60, background: "linear-gradient(transparent, rgba(0,0,0,0.6))" }} />
                    <div style={{ position: "absolute", bottom: 10, left: 14, display: "flex", alignItems: "center", gap: 6 }}>
                      <MapPin size={16} color={COLORS.mustard} />
                      <h3 style={{ margin: 0, fontSize: 17, color: COLORS.white, textShadow: "0 1px 3px rgba(0,0,0,0.5)" }}>{loc.name}</h3>
                    </div>
                  </div>
                  <div style={{ padding: "16px 20px 20px" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
                    <div><div style={{ fontSize: 24, fontWeight: 700, color: COLORS.navy }}>{loc.rating}</div><div style={{ fontSize: 12, color: "#9CA3AF" }}>Rating</div></div>
                    <div><div style={{ fontSize: 24, fontWeight: 700, color: COLORS.terracotta }}>{loc.reviews.toLocaleString()}</div><div style={{ fontSize: 12, color: "#9CA3AF" }}>Reviews</div></div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ fontSize: 13, color: "#6B7280" }}>Top Dish</span><span style={{ fontSize: 13, fontWeight: 600, color: COLORS.navy }}>{loc.topDish}</span></div>
                    <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ fontSize: 13, color: "#6B7280" }}>Margaritas/día</span><span style={{ fontSize: 13, fontWeight: 600, color: COLORS.terracotta }}>~{loc.dailyMargaritas}</span></div>
                    <div>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}><span style={{ fontSize: 13, color: "#6B7280" }}>Sentiment</span><span style={{ fontSize: 13, fontWeight: 600, color: loc.sentiment > 85 ? COLORS.positive : COLORS.mustard }}>{loc.sentiment}%</span></div>
                      <div style={{ height: 6, background: COLORS.lightGray, borderRadius: 3 }}><div style={{ height: "100%", width: `${loc.sentiment}%`, background: loc.sentiment > 85 ? COLORS.positive : COLORS.mustard, borderRadius: 3 }} /></div>
                    </div>
                  </div>
                  </div>
                </SectionCard>
              ))}
            </div>
            <div style={{ background: `linear-gradient(135deg, ${COLORS.terracotta}, ${COLORS.accent1})`, borderRadius: 16, padding: 32, color: COLORS.white, textAlign: "center" }}>
              <div style={{ fontSize: 14, opacity: 0.8, marginBottom: 8 }}>Margaritas vendidas este año (estimado)</div>
              <div style={{ fontSize: 48, fontWeight: 800, letterSpacing: -2 }}>~{(150 * 90).toLocaleString()}</div>
              <div style={{ fontSize: 14, opacity: 0.8, marginTop: 8 }}>~150 diarias x 3 locaciones = contenido infinito</div>
            </div>
          </div>
        )}
      </div>

      {/* ─── FOOTER ─── */}
      <div style={{ padding: "20px 32px", textAlign: "center", borderTop: `1px solid ${COLORS.lightGray}`, marginTop: 40 }}>
        <p style={{ margin: 0, fontSize: 12, color: "#9CA3AF" }}>
          Oh! Mexico Platform • Brand Management Suite • Built by Paradise.la • Mar 2026
          {dataLastUpdated && ` • Datos actualizados: ${new Date(dataLastUpdated).toLocaleDateString("es-MX", { day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" })}`}
        </p>
      </div>

      <style>{`@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`}</style>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(OhMexicoPlatform));
</script>
</body>
</html>
